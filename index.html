<script>
// Storage polyfill using localStorage
window.storage = {
  async get(key) {
    const val = localStorage.getItem(key);
    if (val === null) throw new Error("not found");
    return { key, value: val };
  },
  async set(key, value) {
    localStorage.setItem(key, value);
    return { key, value };
  },
  async delete(key) {
    localStorage.removeItem(key);
    return { key, deleted: true };
  },
  async list(prefix) {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!prefix || k.startsWith(prefix)) keys.push(k);
    }
    return { keys };
  }
};
</script>

// NOTES LIST
// ════════════════════════════════════════
function NotesList({ notes, onEdit, onDelete, onCreate, onUpdate }) {
  const [menuId, setMenuId] = useState(null);
  const [filter, setFilter] = useState("all"); // all, pinned, favorites

  const filtered = notes.filter(n => {
    if (n.archived) return false;
    if (filter === "pinned") return n.pinned;
    if (filter === "favorites") return n.favorite;
    return true;
  }).sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0) || b.updatedAt - a.updatedAt);

  const toggleProp = (id, prop) => {
    const n = notes.find(x => x.id === id);
    if (n) onUpdate({ ...n, [prop]: !n[prop], updatedAt: Date.now() });
    setMenuId(null);
  };

  return (
    <div style={{ flex: 1, overflow: "auto" }}>
      <div style={{ padding: "20px 24px 12px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <h2 style={{ margin: 0, fontSize: 22, fontWeight: 800, color: "#444" }}>Notas</h2>
        <span style={{ fontSize: 12, color: "#bbb", fontWeight: 700 }}>{filtered.length} notas</span>
      </div>

      {/* Filters */}
      <div style={{ padding: "0 24px 10px", display: "flex", gap: 6 }}>
        {[{ id: "all", label: "Todas" }, { id: "pinned", label: "📌 Ancladas" }, { id: "favorites", label: "❤️ Favoritas" }].map(f => (
          <button key={f.id} onClick={() => setFilter(f.id)} style={{
            background: filter === f.id ? ACCENT : "#F5F2FA", border: "none", borderRadius: 10,
            padding: "5px 14px", cursor: "pointer", fontSize: 11, fontWeight: 700,
            color: filter === f.id ? "#fff" : "#888",
          }}>{f.label}</button>
        ))}
      </div>

      <div style={{ padding: "0 24px 80px" }}>
        {filtered.length === 0 ? (
          <div style={{ textAlign: "center", padding: "50px 20px" }}>
            <div style={{ fontSize: 56, marginBottom: 12 }}>📝</div>
            <p style={{ color: "#ccc", fontWeight: 700, fontSize: 15 }}>No hay notas</p>
            <button onClick={onCreate} style={{
              background: ACCENT, border: "none", borderRadius: 14, padding: "10px 24px",
              color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer", marginTop: 12,
            }}>+ Nueva nota</button>
          </div>
        ) : filtered.map(n => (
          <div key={n.id} style={{ position: "relative", marginBottom: 10 }}>
            <div onClick={() => onEdit(n)} style={{
              background: "#fff", borderRadius: 16, padding: "14px 18px",
              border: n.pinned ? `2px solid ${ACCENT}44` : "1.5px solid #F0ECF8", cursor: "pointer",
              boxShadow: "0 2px 8px rgba(0,0,0,0.02)", transition: "all 0.2s",
            }}
              onMouseEnter={e => e.currentTarget.style.boxShadow = "0 6px 20px rgba(124,92,252,0.08)"}
              onMouseLeave={e => e.currentTarget.style.boxShadow = "0 2px 8px rgba(0,0,0,0.02)"}
            >
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    {n.pinned && <span style={{ fontSize: 12 }}>📌</span>}
                    {n.favorite && <span style={{ fontSize: 12 }}>❤️</span>}
                    <h4 style={{ margin: 0, fontSize: 15, fontWeight: 700, color: "#444" }}>{n.title || "Sin título"}</h4>
                  </div>
                  {n.content && <p style={{ margin: "4px 0 0", fontSize: 12, color: "#999", lineHeight: 1.4, display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{n.content}</p>}
                  {n.tags?.length > 0 && (
                    <div style={{ display: "flex", gap: 4, marginTop: 6 }}>
                      {n.tags.map(t => <span key={t} style={{ fontSize: 10, background: ACCENT_LIGHT, color: ACCENT, padding: "2px 8px", borderRadius: 6, fontWeight: 700 }}>{t}</span>)}
                    </div>
                  )}
                </div>
                <button onClick={e => { e.stopPropagation(); setMenuId(menuId === n.id ? null : n.id); }} style={{
                  background: "transparent", border: "none", fontSize: 18, cursor: "pointer", color: "#ccc", padding: "0 4px", flexShrink: 0,
                }}>⋮</button>
              </div>
              <span style={{ fontSize: 10, color: "#ddd", fontWeight: 600 }}>
                {new Date(n.updatedAt).toLocaleDateString("es-PE", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" })}
              </span>
            </div>

            {/* Context menu */}
            {menuId === n.id && (
              <div style={{
                position: "absolute", top: 40, right: 16, zIndex: 50,
                background: "#fff", borderRadius: 16, padding: "6px 0",
                boxShadow: "0 8px 32px rgba(0,0,0,0.12)", border: "1.5px solid #F0ECF8",
                minWidth: 180,
              }}>
                {[
                  { icon: "📌", label: n.pinned ? "Desanclar" : "Anclar", action: () => toggleProp(n.id, "pinned") },
                  { icon: "❤️", label: n.favorite ? "Quitar favorito" : "Favorito", action: () => toggleProp(n.id, "favorite") },
                  { icon: "🏷️", label: "Añadir etiqueta", action: () => { const tag = prompt("Nombre de la etiqueta:"); if (tag?.trim()) { const note = notes.find(x => x.id === n.id); onUpdate({ ...note, tags: [...(note.tags || []), tag.trim()], updatedAt: Date.now() }); } setMenuId(null); } },
                  { icon: "📦", label: "Archivar", action: () => toggleProp(n.id, "archived") },
                  { icon: "🗑️", label: "Eliminar", action: () => { onDelete(n.id); setMenuId(null); }, danger: true },
                ].map((item, i) => (
                  <button key={i} onClick={item.action} style={{
                    display: "flex", alignItems: "center", gap: 10, width: "100%", padding: "10px 16px",
                    background: "transparent", border: "none", cursor: "pointer",
                    fontSize: 13, fontWeight: 600, color: item.danger ? RED_SOFT : "#555",
                    textAlign: "left",
                  }}
                    onMouseEnter={e => e.currentTarget.style.background = "#F8F5FF"}
                    onMouseLeave={e => e.currentTarget.style.background = "transparent"}
                  >
                    <span style={{ fontSize: 16 }}>{item.icon}</span> {item.label}
                  </button>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// NOTE EDITOR (like the screenshot: title, details, toolbar, assign to notebook)
// ════════════════════════════════════════
function NoteEditor({ note, notebooks, onSave, onClose }) {
  const [title, setTitle] = useState(note?.title || "");
  const [content, setContent] = useState(note?.content || "");
  const [notebookId, setNotebookId] = useState(note?.notebookId || "none");
  const [showNbPicker, setShowNbPicker] = useState(false);
  const [checklist, setChecklist] = useState(note?.checklist || []);
  const [mode, setMode] = useState(note?.checklist?.length ? "checklist" : "text");

  const save = () => {
    onSave({
      ...note, id: note?.id || gid(), title: title || "Sin título",
      content, notebookId, checklist: mode === "checklist" ? checklist : [],
      type: "note", createdAt: note?.createdAt || Date.now(), updatedAt: Date.now(),
    });
  };

  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column", background: "#FAFAFE", fontFamily: "'Nunito',sans-serif" }}>
      {/* Top */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 16px", flexShrink: 0 }}>
        <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: "#999" }}>←</button>
        <button onClick={save} style={{
          background: ACCENT, border: "none", borderRadius: 12, padding: "8px 22px",
          color: "#fff", fontWeight: 800, fontSize: 14, cursor: "pointer",
        }}>guardar</button>
      </div>

      {/* Notebook selector */}
      <div style={{ padding: "0 20px 8px", display: "flex", justifyContent: "flex-end" }}>
        <button onClick={() => setShowNbPicker(!showNbPicker)} style={{
          background: ACCENT_LIGHT, border: `1.5px solid ${ACCENT}44`,
          borderRadius: 10, padding: "5px 14px", cursor: "pointer",
          fontSize: 12, fontWeight: 700, color: ACCENT,
        }}>
          {notebookId !== "none" ? (notebooks.find(n => n.id === notebookId)?.name || "cuaderno") : "cuaderno nuevo"} ✓
        </button>
      </div>
      {showNbPicker && (
        <div style={{ padding: "0 20px 8px", display: "flex", gap: 6, flexWrap: "wrap" }}>
          <button onClick={() => { setNotebookId("none"); setShowNbPicker(false); }} style={{
            background: notebookId === "none" ? ACCENT : "#f0f0f0", color: notebookId === "none" ? "#fff" : "#888",
            border: "none", borderRadius: 8, padding: "5px 12px", cursor: "pointer", fontSize: 11, fontWeight: 700,
          }}>Sin cuaderno</button>
          {notebooks.map(nb => (
            <button key={nb.id} onClick={() => { setNotebookId(nb.id); setShowNbPicker(false); }} style={{
              background: notebookId === nb.id ? ACCENT : "#f0f0f0", color: notebookId === nb.id ? "#fff" : "#888",
              border: "none", borderRadius: 8, padding: "5px 12px", cursor: "pointer", fontSize: 11, fontWeight: 700,
            }}>{nb.cover.emoji} {nb.name}</button>
          ))}
        </div>
      )}

      {/* Content */}
      <div style={{ flex: 1, padding: "0 20px", overflow: "auto" }}>
        <input value={title} onChange={e => setTitle(e.target.value)} placeholder="título"
          style={{ width: "100%", border: "none", outline: "none", fontSize: 22, fontWeight: 700, color: "#444", background: "transparent", marginBottom: 4, fontFamily: "'Nunito',sans-serif" }} />
        {mode === "text" ? (
          <textarea value={content} onChange={e => setContent(e.target.value)} placeholder="detalles"
            style={{ width: "100%", border: "none", outline: "none", fontSize: 15, color: "#777", background: "transparent", resize: "none", flex: 1, minHeight: 300, lineHeight: 1.7, fontFamily: "'Nunito',sans-serif" }} />
        ) : (
          <div>
            {checklist.map((item, i) => (
              <div key={item.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "5px 0" }}>
                <div onClick={() => setChecklist(prev => prev.map((c, j) => j === i ? { ...c, done: !c.done } : c))} style={{
                  width: 22, height: 22, borderRadius: 7, cursor: "pointer", flexShrink: 0,
                  background: item.done ? GREEN : "#fff", border: item.done ? "none" : "2px solid #ddd",
                  display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 12, fontWeight: 700,
                }}>{item.done && "✓"}</div>
                <input value={item.text} onChange={e => setChecklist(prev => prev.map((c, j) => j === i ? { ...c, text: e.target.value } : c))}
                  placeholder="nuevo item..." style={{
                    flex: 1, border: "none", outline: "none", fontSize: 14, color: item.done ? "#bbb" : "#555",
                    textDecoration: item.done ? "line-through" : "none", fontFamily: "'Nunito',sans-serif",
                  }} />
                <span onClick={() => setChecklist(prev => prev.filter((_, j) => j !== i))} style={{ cursor: "pointer", color: "#ddd", fontWeight: 700, fontSize: 16 }}>×</span>
              </div>
            ))}
            <button onClick={() => setChecklist(prev => [...prev, { id: gid(), text: "", done: false }])} style={{
              background: "none", border: "2px dashed #ddd", borderRadius: 10, padding: "6px 14px",
              cursor: "pointer", color: "#bbb", fontWeight: 700, fontSize: 12, width: "100%", marginTop: 6,
            }}>+ Agregar item</button>
          </div>
        )}
      </div>

      {/* Bottom toolbar */}
      <div style={{
        display: "flex", alignItems: "center", gap: 2, padding: "10px 16px",
        background: "#fff", borderTop: "1.5px solid #F0ECF8", overflowX: "auto", flexShrink: 0,
      }}>
        {[
          { icon: "Aa", action: () => {} },
          { icon: "😊", action: () => {} },
          { icon: "✅", action: () => setMode(mode === "checklist" ? "text" : "checklist") },
          { icon: "📎", action: () => {} },
          { icon: "🎨", action: () => {} },
          { icon: "⭐", action: () => {} },
        ].map((t, i) => (
          <button key={i} onClick={t.action} style={{
            background: (t.icon === "✅" && mode === "checklist") ? ACCENT_LIGHT : "transparent",
            border: "none", borderRadius: 10, width: 38, height: 38, cursor: "pointer",
            display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18,
            transition: "all 0.15s",
          }}>{t.icon}</button>
        ))}
      </div>
    </div>
  );
}

// CALENDAR VIEW
// ════════════════════════════════════════
function CalendarView({ events, onAddEvent }) {
  const [selectedDate, setSelectedDate] = useState(new Date());
  const today = new Date();

  const getWeekDays = () => {
    const days = [];
    const start = new Date(selectedDate);
    start.setDate(start.getDate() - start.getDay());
    for (let i = 0; i < 7; i++) {
      const d = new Date(start);
      d.setDate(d.getDate() + i);
      days.push(d);
    }
    return days;
  };

  const week = getWeekDays();
  const dayEvents = events.filter(e => {
    const ed = new Date(e.date);
    return ed.toDateString() === selectedDate.toDateString();
  });

  const hours = Array.from({ length: 18 }, (_, i) => i + 6);

  return (
    <div style={{ flex: 1, overflow: "auto" }}>
      <div style={{ padding: "20px 24px 12px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 800, color: "#444" }}>Calendario</h2>
          <button onClick={() => onAddEvent()} style={{
            background: "none", border: "none", color: ACCENT, fontSize: 13, fontWeight: 700, cursor: "pointer",
          }}>ver todo →</button>
        </div>

        {/* Week strip */}
        <div style={{ display: "flex", gap: 6, justifyContent: "space-between" }}>
          {week.map((d, i) => {
            const isToday = d.toDateString() === today.toDateString();
            const isSel = d.toDateString() === selectedDate.toDateString();
            return (
              <button key={i} onClick={() => setSelectedDate(d)} style={{
                flex: 1, background: isSel ? ACCENT : "#fff",
                border: isSel ? "none" : "1.5px solid #F0ECF8",
                borderRadius: 14, padding: "10px 4px", cursor: "pointer",
                display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
                transition: "all 0.2s",
              }}>
                <span style={{ fontSize: 16, fontWeight: 800, color: isSel ? "#fff" : "#444" }}>{d.getDate()}</span>
                <span style={{ fontSize: 10, fontWeight: 700, color: isSel ? "rgba(255,255,255,0.8)" : isToday ? ACCENT : "#bbb" }}>
                  {DAYS_ES[d.getDay()]}
                </span>
              </button>
            );
          })}
        </div>
      </div>

      {/* Timeline */}
      <div style={{ padding: "8px 24px 80px" }}>
        {hours.map(h => {
          const hEvents = dayEvents.filter(e => new Date(e.date).getHours() === h);
          return (
            <div key={h} style={{
              display: "flex", gap: 12, borderBottom: "1px solid #F5F2FA", padding: "10px 0", minHeight: 40,
            }}>
              <span style={{ fontSize: 12, color: "#bbb", fontWeight: 600, width: 60, flexShrink: 0, textAlign: "right", paddingRight: 8 }}>
                {h.toString().padStart(2, "0")}:00
              </span>
              <div style={{ flex: 1 }}>
                {hEvents.map(ev => (
                  <div key={ev.id} style={{
                    background: ACCENT_LIGHT, borderLeft: `3px solid ${ACCENT}`,
                    borderRadius: 8, padding: "6px 10px", marginBottom: 4,
                  }}>
                    <span style={{ fontSize: 13, fontWeight: 700, color: ACCENT }}>{ev.title}</span>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// TASK / EVENT QUICK CREATOR
// ════════════════════════════════════════
function QuickCreator({ type, onSave, onClose }) {
  const [text, setText] = useState("");
  const [date, setDate] = useState(new Date().toISOString().slice(0, 16));

  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 900, background: "rgba(100,80,150,0.2)", backdropFilter: "blur(10px)",
      display: "flex", alignItems: "center", justifyContent: "center", padding: 16,
    }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        background: "#fff", borderRadius: 24, width: "100%", maxWidth: 400, padding: 24,
        boxShadow: "0 20px 60px rgba(124,92,252,0.15)",
      }}>
        <h3 style={{ margin: "0 0 16px", fontSize: 18, fontWeight: 800, color: "#444" }}>
          {type === "task" ? "✅ Nueva tarea" : "📅 Nuevo evento"}
        </h3>
        <input value={text} onChange={e => setText(e.target.value)} placeholder={type === "task" ? "¿Qué necesitas hacer?" : "Nombre del evento"}
          autoFocus style={{
            width: "100%", border: "2px solid #F0ECF8", borderRadius: 14, padding: "12px 16px",
            fontSize: 15, fontWeight: 600, outline: "none", fontFamily: "'Nunito',sans-serif", marginBottom: 12,
          }} />
        {type === "event" && (
          <input type="datetime-local" value={date} onChange={e => setDate(e.target.value)}
            style={{
              width: "100%", border: "2px solid #F0ECF8", borderRadius: 14, padding: "10px 16px",
              fontSize: 14, fontWeight: 600, outline: "none", fontFamily: "'Nunito',sans-serif", marginBottom: 12, color: "#666",
            }} />
        )}
        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
          <button onClick={onClose} style={{ background: "#f5f5f5", border: "none", borderRadius: 12, padding: "10px 20px", cursor: "pointer", fontWeight: 700, color: "#999", fontSize: 14 }}>Cancelar</button>
          <button onClick={() => { if (text.trim()) onSave({ id: gid(), text, title: text, date: type === "event" ? new Date(date).getTime() : Date.now(), done: false, type, createdAt: Date.now(), updatedAt: Date.now() }); }}
            style={{ background: ACCENT, border: "none", borderRadius: 12, padding: "10px 24px", cursor: "pointer", fontWeight: 800, color: "#fff", fontSize: 14 }}>
            Crear
          </button>
        </div>
      </div>
    </div>
  );
}

function NotebooksShelf({ notebooks, onCreate, onOpen, onDelete }) {

          aspectRatio: "3/4", borderRadius: 18, border: "2.5px dashed #D0C8E8",

              </div>

            </div>
            {/* Delete */}
            <button onClick={() => onDelete(nb.id)} style={{
              position: "absolute", top: 6, right: 6, width: 24, height: 24, borderRadius: "50%",
              background: "rgba(255,80,80,0.8)", border: "1.5px solid rgba(255,255,255,0.5)",
              color: "#fff", fontSize: 10, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
              zIndex: 2,
            }}>×</button>
          </div>
        ))}
      </div>
    </div>
  );
}

function NotebookCreator({ onClose, onCreate }) {
  const [name, setName] = useState("");
  const allCovers = COVER_CATEGORIES.flatMap(c => c.covers);
  const [cover, setCover] = useState(allCovers[1]);
  const [paper, setPaper] = useState("ruled");
  const [wallpaper, setWallpaper] = useState(WALLPAPERS[0]);
  const [paperColor, setPaperColor] = useState(PAPER_COLORS[0]);
  const [lineColor, setLineColor] = useState(LINE_COLORS[0]);
  const [spacing, setSpacing] = useState(5);
  const [coverTab, setCoverTab] = useState("portada");
  const [activeCoverCat, setActiveCoverCat] = useState(COVER_CATEGORIES[0].id);
  const [customImage, setCustomImage] = useState(null); // base64 data URL
  const fileRef = useRef(null);

  const handleImageUpload = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const dataUrl = ev.target.result;
      setCustomImage(dataUrl);
      setCover({ id: "custom-img", name: file.name.split(".")[0] || "Mi portada", bg: "#fff", emoji: "", customImage: dataUrl });
    };
    reader.readAsDataURL(file);
  };

  const coverBg = cover.customImage || customImage ? "transparent" : cover.bg;
  const coverImg = cover.customImage || (cover.id === "custom-img" ? customImage : null);

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 900, background: "rgba(100,80,150,0.15)", backdropFilter: "blur(10px)", display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        background: "#fff", borderRadius: "24px 24px 0 0", width: "100%", maxWidth: 520,
        maxHeight: "92vh", overflow: "hidden", display: "flex", flexDirection: "column",
        boxShadow: "0 -8px 40px rgba(0,0,0,0.1)",
      }}>
        {/* Header */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 20px", borderBottom: "1px solid #F0ECF8", flexShrink: 0 }}>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "#999", fontWeight: 600, cursor: "pointer", fontSize: 14 }}>Cancelar</button>
          <span style={{ fontWeight: 800, fontSize: 16, color: "#444" }}>Nuevo cuaderno</span>
          <button onClick={() => {
            const finalCover = coverImg ? { ...cover, customImage: coverImg } : cover;
            onCreate({
              id: gid(), name: name || "Sin título", cover: finalCover, paperType: paper, wallpaper,
              paperColor: paperColor.color, lineColor: lineColor.color, spacing,
              pages: [{ id: gid(), canvasData: null, elements: [], createdAt: Date.now(), updatedAt: Date.now() }],
              createdAt: Date.now(), updatedAt: Date.now(),
            });
          }} style={{ background: ACCENT, border: "none", borderRadius: 10, padding: "6px 18px", color: "#fff", fontWeight: 800, fontSize: 13, cursor: "pointer" }}>Crear</button>
        </div>

        <div style={{ flex: 1, overflow: "auto", padding: "16px 20px 30px" }}>
          {/* Title */}
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
            <span style={{ fontSize: 12, color: "#999", fontWeight: 600, flexShrink: 0 }}>Título</span>
            <input value={name} onChange={e => setName(e.target.value)} placeholder="Cuaderno sin título" style={{
              flex: 1, border: "none", borderBottom: "1.5px solid #F0ECF8", outline: "none", padding: "8px 0",
              fontSize: 15, fontWeight: 600, color: "#444", fontFamily: "'Nunito',sans-serif",
            }} />
          </div>

          {/* Preview: Portada + Plantilla */}
          <div style={{ display: "flex", justifyContent: "center", gap: 16, marginBottom: 20 }}>
            {/* Portada preview */}
            <div onClick={() => setCoverTab("portada")} style={{ cursor: "pointer", textAlign: "center" }}>

// DRAGGABLE ELEMENT
// ════════════════════════════════════════
function DragEl({ el, cW, cH, onMove, onRemove, onEdit, onSelect, sel }) {
  const ref = useRef(null);
  const drag = useRef(false);
  const off = useRef({ x: 0, y: 0 });
  const par = useRef(null);

  useEffect(() => { par.current = ref.current?.closest("[data-ov]"); }, []);

  const down = (e) => {
    if (e.target.closest("[data-act]")) return;
    e.stopPropagation(); e.preventDefault();
    drag.current = true;
    const r = par.current?.getBoundingClientRect(); if (!r) return;
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    off.current = { x: cx - r.left - (el.x / cW) * r.width, y: cy - r.top - (el.y / cH) * r.height };
    onSelect(el.id);
    const mv = (ev) => { if (!drag.current) return; ev.preventDefault(); const mx = ev.touches ? ev.touches[0].clientX : ev.clientX; const my = ev.touches ? ev.touches[0].clientY : ev.clientY; onMove(el.id, Math.max(5, Math.min(cW - 5, ((mx - r.left - off.current.x) / r.width) * cW)), Math.max(5, Math.min(cH - 5, ((my - r.top - off.current.y) / r.height) * cH))); };
    const up = () => { drag.current = false; window.removeEventListener("mousemove", mv); window.removeEventListener("mouseup", up); window.removeEventListener("touchmove", mv); window.removeEventListener("touchend", up); };
    window.addEventListener("mousemove", mv); window.addEventListener("mouseup", up);
    window.addEventListener("touchmove", mv, { passive: false }); window.addEventListener("touchend", up);
  };

  return (
    <div ref={ref} onMouseDown={down} onTouchStart={down} style={{
      position: "absolute", left: `${(el.x / cW) * 100}%`, top: `${(el.y / cH) * 100}%`,
      transform: "translate(-50%,-50%)", pointerEvents: "auto", cursor: "grab", userSelect: "none",
      border: sel ? `2px dashed ${ACCENT}` : "2px dashed transparent", borderRadius: 6, padding: 3, touchAction: "none",
    }}>
      {el.type === "sticker" && <span style={{ fontSize: el.size || 36, display: "block" }}>{el.emoji}</span>}
      {el.type === "text" && (
        <span onDoubleClick={e => { e.stopPropagation(); onEdit(el.id); }} style={{
          fontSize: el.size || 20, color: el.color || "#333", fontFamily: el.fontFamily || "'Caveat',cursive",
          fontWeight: el.bold ? 800 : 500, fontStyle: el.italic ? "italic" : "normal",
          textDecoration: el.underline ? "underline" : "none", whiteSpace: "pre-wrap", maxWidth: 400, lineHeight: 1.3, display: "block",
        }}>{el.text}</span>
      )}
      {sel && <button data-act onClick={e => { e.stopPropagation(); onRemove(el.id); }} style={{
        position: "absolute", top: -10, right: -10, width: 20, height: 20, borderRadius: "50%",
        background: "#FF4757", border: "2px solid #fff", color: "#fff", fontSize: 10, cursor: "pointer",
        display: "flex", alignItems: "center", justifyContent: "center",
      }}>×</button>}
    </div>
  );
}

function NbCanvas({ notebook, page, onSave, onBack }) {
  const cvRef = useRef(null);
  const [tool, setTool] = useState("pen");
  const [penColor, setPenColor] = useState("#333");
  const [penSz, setPenSz] = useState(2);
  const [hlColor, setHlColor] = useState(HL_COLORS[0]);
  const [isDraw, setIsDraw] = useState(false);
  const [els, setEls] = useState(page?.elements || []);
  const [selId, setSelId] = useState(null);
  const [editId, setEditId] = useState(null);
  const [editTxt, setEditTxt] = useState("");
  const [tFont, setTFont] = useState(FONTS[0]);
  const [tSize, setTSize] = useState(20);
  const [tBold, setTBold] = useState(false);
  const [tItalic, setTItalic] = useState(false);
  const [inline, setInline] = useState(null);
  const [inTxt, setInTxt] = useState("");
  const [sub, setSub] = useState(null); // "colors"|"hl"|"stickers"|"size"|"fonts"|"tsizes"
  const last = useRef(null);
  const W = 700, H = 900;

  useEffect(() => {
    const c = cvRef.current, x = c.getContext("2d");
    c.width = W * 2; c.height = H * 2; x.scale(2, 2); x.lineCap = "round"; x.lineJoin = "round";
    if (page?.canvasData) { const img = new Image(); img.onload = () => x.drawImage(img, 0, 0, W, H); img.src = page.canvasData; }
    if (page?.elements) setEls(page.elements);
  }, [page?.id]);

  const drawBg = useCallback((x) => {
    const p = notebook.paperType;
    const lc = notebook.lineColor || "rgba(180,200,220,0.3)";
    const sp = (notebook.spacing || 5) * 5 + 4;
    x.strokeStyle = lc; x.lineWidth = 0.5;
    if (p === "grid") { for (let i = 0; i <= W; i += sp) { x.beginPath(); x.moveTo(i, 0); x.lineTo(i, H); x.stroke(); } for (let i = 0; i <= H; i += sp) { x.beginPath(); x.moveTo(0, i); x.lineTo(W, i); x.stroke(); } }
    else if (p === "ruled") { for (let y = 40; y <= H; y += sp) { x.beginPath(); x.moveTo(40, y); x.lineTo(W - 20, y); x.stroke(); } x.strokeStyle = "rgba(124,92,252,0.2)"; x.lineWidth = 1; x.beginPath(); x.moveTo(60, 0); x.lineTo(60, H); x.stroke(); }
    else if (p === "dotted") { x.fillStyle = lc.replace(/[\d.]+\)$/, "0.5)"); for (let i = 12; i <= W; i += sp) for (let j = 12; j <= H; j += sp) { x.beginPath(); x.arc(i, j, 1, 0, Math.PI * 2); x.fill(); } }
  }, [notebook.paperType, notebook.lineColor, notebook.spacing]);

  useEffect(() => { if (!page?.canvasData) { const x = cvRef.current.getContext("2d"); x.fillStyle = notebook.paperColor || "#FFFBFE"; x.fillRect(0, 0, W, H); drawBg(x); } }, [page?.id, drawBg, notebook.paperColor]);

  const pos = (e) => { const r = cvRef.current.getBoundingClientRect(); const cx = e.touches ? e.touches[0].clientX : e.clientX; const cy = e.touches ? e.touches[0].clientY : e.clientY; return { x: (cx - r.left) * (W / r.width), y: (cy - r.top) * (H / r.height) }; };

  // ... canvas area uses wallpaper bg
  const wallpaperBg = notebook.wallpaper?.css || "";
  const wallpaperDark = notebook.wallpaper?.dark;

  const dn = (e) => { if (tool === "sticker" || tool === "text") return; e.preventDefault(); setIsDraw(true); last.current = pos(e); setSelId(null); };
  const mv = (e) => { if (!isDraw) return; e.preventDefault(); const x = cvRef.current.getContext("2d"), p = pos(e);
    if (tool === "eraser") { x.globalCompositeOperation = "destination-out"; x.lineWidth = penSz * 8; x.beginPath(); x.moveTo(last.current.x, last.current.y); x.lineTo(p.x, p.y); x.stroke(); x.globalCompositeOperation = "source-over"; }
    else if (tool === "hl") { x.globalAlpha = hlColor.a; x.strokeStyle = hlColor.color; x.lineWidth = 20; x.beginPath(); x.moveTo(last.current.x, last.current.y); x.lineTo(p.x, p.y); x.stroke(); x.globalAlpha = 1; }
    else { x.globalAlpha = 1; x.strokeStyle = penColor; x.lineWidth = penSz; x.beginPath(); x.moveTo(last.current.x, last.current.y); x.lineTo(p.x, p.y); x.stroke(); }
    last.current = p; };
  const up = () => { setIsDraw(false); last.current = null; };

  const click = (e) => { const p = pos(e); if (tool === "text") { setInline(p); setInTxt(""); setSelId(null); } else setSelId(null); };
  const commitInline = () => { if (inTxt.trim()) setEls(pr => [...pr, { id: gid(), type: "text", text: inTxt, x: inline.x, y: inline.y, color: penColor, size: tSize, fontFamily: tFont.f, fontId: tFont.id, bold: tBold, italic: tItalic }]); setInline(null); setInTxt(""); };
  const startEdit = (id) => { const e = els.find(x => x.id === id); if (e?.type === "text") { setEditId(id); setEditTxt(e.text); setSelId(id); } };
  const commitEdit = () => { if (editId) setEls(pr => pr.map(e => e.id === editId ? { ...e, text: editTxt || e.text } : e)); setEditId(null); };
  const moveEl = (id, x, y) => setEls(pr => pr.map(e => e.id === id ? { ...e, x, y } : e));
  const rmEl = (id) => { setEls(pr => pr.filter(e => e.id !== id)); if (selId === id) setSelId(null); };
  const updSel = (u) => { if (selId) setEls(pr => pr.map(e => e.id === selId ? { ...e, ...u } : e)); };
  const placeSticker = (emoji) => { setEls(pr => [...pr, { id: gid(), type: "sticker", emoji, x: 100 + Math.random() * 400, y: 100 + Math.random() * 500, size: 36 }]); setSub(null); };

  const save = () => { const d = cvRef.current.toDataURL("image/png"); onSave({ ...page, canvasData: d, elements: els, updatedAt: Date.now() }); };
  const clear = () => { const x = cvRef.current.getContext("2d"); x.fillStyle = "#FFFBFE"; x.fillRect(0, 0, W, H); drawBg(x); setEls([]); setSelId(null); };

  const selEl = els.find(e => e.id === selId);
  const btn = { border: "none", borderRadius: 8, padding: "4px 10px", cursor: "pointer", fontFamily: "'Nunito',sans-serif", fontWeight: 700, fontSize: 12 };
  const tools = [{ id: "pen", i: "✏️", l: "Pluma" }, { id: "hl", i: "🖍️", l: "Resaltador" }, { id: "eraser", i: "🧹", l: "Borrador" }, { id: "text", i: "T", l: "Texto" }, { id: "sticker", i: "⭐", l: "Sticker" }];

  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column", background: "#F5F2FA", fontFamily: "'Nunito',sans-serif" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 16px", background: "#fff", borderBottom: "2px solid #F0ECF8", flexShrink: 0 }}>
        <button onClick={() => { save(); onBack(); }} style={{ background: "none", border: "none", fontSize: 18, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
          <span>←</span><span style={{ fontSize: 13, color: "#999", fontWeight: 600 }}>{notebook.name}</span>
        </button>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={clear} style={{ ...btn, background: "#FFF0F6", color: PINK }}>Limpiar</button>
          <button onClick={save} style={{ ...btn, background: ACCENT, color: "#fff", padding: "6px 16px" }}>Guardar ✨</button>
        </div>
      </div>

      <div style={{ display: "flex", alignItems: "center", gap: 3, padding: "7px 10px", background: "#fff", borderBottom: "1px solid #F0ECF8", overflowX: "auto", flexShrink: 0 }}>
        {tools.map(t => (
          <button key={t.id} onClick={() => { setTool(t.id); setSub(t.id === "pen" ? (sub === "colors" && tool === "pen" ? null : "colors") : t.id === "hl" ? (sub === "hl" && tool === "hl" ? null : "hl") : t.id === "sticker" ? "stickers" : null); }} style={{
            background: tool === t.id ? ACCENT + "18" : "transparent", border: tool === t.id ? `2px solid ${ACCENT}44` : "2px solid transparent",
            borderRadius: 10, padding: "5px 10px", cursor: "pointer", fontWeight: 700, fontSize: 12,
            display: "flex", alignItems: "center", gap: 3, color: tool === t.id ? ACCENT : "#888", whiteSpace: "nowrap",
          }}><span style={{ fontSize: t.id === "text" ? 14 : 15, fontWeight: t.id === "text" ? 800 : 400, fontStyle: t.id === "text" ? "italic" : "normal", fontFamily: t.id === "text" ? "Georgia,serif" : "inherit" }}>{t.i}</span><span style={{ fontSize: 10 }}>{t.l}</span></button>
        ))}
        <div style={{ width: 1, height: 24, background: "#eee", margin: "0 3px", flexShrink: 0 }} />
        <button onClick={() => setSub(sub === "size" ? null : "size")} style={{ background: sub === "size" ? ACCENT_LIGHT : "transparent", border: "none", borderRadius: 10, padding: "5px 10px", cursor: "pointer", display: "flex", alignItems: "center", gap: 3 }}>
          <div style={{ width: penSz * 2 + 4, height: penSz * 2 + 4, borderRadius: "50%", background: penColor, minWidth: 6, maxWidth: 20 }} />
          <span style={{ fontSize: 10, color: "#888", fontWeight: 700 }}>Trazo</span>
        </button>
      </div>

      {/* Text format bar */}
      {(tool === "text" || selEl?.type === "text") && (
        <div style={{ display: "flex", alignItems: "center", gap: 5, padding: "6px 10px", background: "#FEFBFF", borderBottom: "1px solid #F0ECF8", overflowX: "auto", flexShrink: 0 }}>
          <button onClick={() => setSub(sub === "fonts" ? null : "fonts")} style={{ ...btn, background: sub === "fonts" ? ACCENT : "#fff", color: sub === "fonts" ? "#fff" : "#666", border: "1.5px solid #eee", fontFamily: selEl?.fontFamily || tFont.f, maxWidth: 100, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
            {FONTS.find(f => f.f === (selEl?.fontFamily || tFont.f))?.name || tFont.name}
          </button>
          <button onClick={() => setSub(sub === "tsizes" ? null : "tsizes")} style={{ ...btn, background: sub === "tsizes" ? ACCENT : "#fff", color: sub === "tsizes" ? "#fff" : "#666", border: "1.5px solid #eee", minWidth: 32 }}>{selEl?.size || tSize}</button>
          <div style={{ width: 1, height: 20, background: "#eee" }} />
          {[{ k: "bold", l: "B", s: { fontWeight: 800 } }, { k: "italic", l: "I", s: { fontStyle: "italic", fontFamily: "Georgia,serif" } }, { k: "underline", l: "U", s: { textDecoration: "underline" } }].map(b => {
            const on = selEl ? selEl[b.k] : (b.k === "bold" ? tBold : tItalic);
            return <button key={b.k} onClick={() => { if (selEl) updSel({ [b.k]: !selEl[b.k] }); else b.k === "bold" ? setTBold(!tBold) : setTItalic(!tItalic); }} style={{ ...btn, width: 28, height: 28, padding: 0, display: "flex", alignItems: "center", justifyContent: "center", background: on ? ACCENT : "#fff", color: on ? "#fff" : "#888", border: "1.5px solid #eee", fontSize: 13, ...b.s }}>{b.l}</button>;
          })}
          <div style={{ width: 1, height: 20, background: "#eee" }} />
          {PEN_COLORS.slice(0, 7).map(c => (
            <div key={c} onClick={() => { setPenColor(c); if (selEl) updSel({ color: c }); }} style={{
              width: 18, height: 18, borderRadius: 5, background: c, cursor: "pointer",
              border: ((selEl?.color || penColor) === c) ? "2.5px solid #333" : "1.5px solid #ddd",
              transform: ((selEl?.color || penColor) === c) ? "scale(1.15)" : "", transition: "all 0.1s",
            }} />
          ))}
        </div>
      )}

      {/* Sub panels */}
      {sub === "colors" && tool === "pen" && <div style={{ display: "flex", gap: 4, padding: "7px 12px", background: "#FEFBFF", borderBottom: "1px solid #F0ECF8", flexWrap: "wrap", flexShrink: 0 }}>{PEN_COLORS.map(c => <div key={c} onClick={() => setPenColor(c)} style={{ width: 24, height: 24, borderRadius: 7, background: c, cursor: "pointer", border: penColor === c ? "3px solid #333" : "2px solid #eee", transform: penColor === c ? "scale(1.15)" : "" }} />)}</div>}
      {sub === "hl" && <div style={{ display: "flex", gap: 5, padding: "7px 12px", background: "#FEFBFF", borderBottom: "1px solid #F0ECF8", flexShrink: 0 }}>{HL_COLORS.map(h => <div key={h.color} onClick={() => setHlColor(h)} style={{ width: 30, height: 24, borderRadius: 7, background: h.color, opacity: 0.5, cursor: "pointer", border: hlColor.color === h.color ? "3px solid #333" : "2px solid #eee" }} />)}</div>}
      {sub === "size" && <div style={{ display: "flex", gap: 8, padding: "7px 12px", background: "#FEFBFF", borderBottom: "1px solid #F0ECF8", alignItems: "center", flexShrink: 0 }}><span style={{ fontSize: 10, color: "#aaa", fontWeight: 600 }}>Fino</span><input type="range" min={1} max={10} value={penSz} onChange={e => setPenSz(+e.target.value)} style={{ flex: 1, maxWidth: 180, accentColor: ACCENT }} /><span style={{ fontSize: 10, color: "#aaa", fontWeight: 600 }}>Grueso</span></div>}
      {sub === "stickers" && <div style={{ display: "flex", gap: 3, padding: "7px 12px", background: "#FEFBFF", borderBottom: "1px solid #F0ECF8", flexWrap: "wrap", flexShrink: 0 }}>{STICKERS.map((s, i) => <span key={i} onClick={() => placeSticker(s)} style={{ fontSize: 20, cursor: "pointer", padding: 2, borderRadius: 6 }} onMouseEnter={e => e.target.style.transform = "scale(1.3)"} onMouseLeave={e => e.target.style.transform = ""}>{s}</span>)}</div>}
      {sub === "fonts" && <div style={{ display: "flex", gap: 5, padding: "7px 12px", background: "#FEFBFF", borderBottom: "1px solid #F0ECF8", flexWrap: "wrap", flexShrink: 0 }}>{FONTS.map(f => <button key={f.id} onClick={() => { setTFont(f); if (selEl) updSel({ fontFamily: f.f, fontId: f.id }); setSub(null); }} style={{ ...btn, background: (selEl?.fontId || tFont.id) === f.id ? ACCENT : "#F9F8FC", color: (selEl?.fontId || tFont.id) === f.id ? "#fff" : "#666", fontFamily: f.f, fontSize: 13, border: "1.5px solid #eee" }}>{f.name}</button>)}</div>}
      {sub === "tsizes" && <div style={{ display: "flex", gap: 5, padding: "7px 12px", background: "#FEFBFF", borderBottom: "1px solid #F0ECF8", flexShrink: 0 }}>{TSIZES.map(s => <button key={s} onClick={() => { setTSize(s); if (selEl) updSel({ size: s }); setSub(null); }} style={{ ...btn, width: 34, height: 34, padding: 0, display: "flex", alignItems: "center", justifyContent: "center", background: (selEl?.size || tSize) === s ? ACCENT : "#F9F8FC", color: (selEl?.size || tSize) === s ? "#fff" : "#888", border: "1.5px solid #eee" }}>{s}</button>)}</div>}

      {/* Canvas */}
      <div style={{ flex: 1, overflow: "auto", display: "flex", justifyContent: "center", padding: "12px 6px", background: wallpaperBg || "#EDE8F5", minHeight: 0 }}>
        <div style={{ position: "relative", width: "100%", maxWidth: W, boxShadow: "0 6px 32px rgba(0,0,0,0.07)", borderRadius: 4, background: wallpaperBg ? "transparent" : "#fff", overflow: "hidden" }}>
          {wallpaperBg && <div style={{ position: "absolute", inset: 0, background: wallpaperBg, zIndex: 0, borderRadius: 4 }} />}
          <canvas ref={cvRef} onMouseDown={dn} onMouseMove={mv} onMouseUp={up} onMouseLeave={up} onTouchStart={dn} onTouchMove={mv} onTouchEnd={up} onClick={click}
            style={{ width: "100%", height: "auto", aspectRatio: `${W}/${H}`, display: "block", cursor: tool === "eraser" ? "cell" : tool === "text" ? "text" : "crosshair", touchAction: "none", borderRadius: 4 }} />
          <div data-ov style={{ position: "absolute", inset: 0, pointerEvents: "none" }}>
            {els.map(el => editId === el.id ? (
              <div key={el.id} style={{ position: "absolute", left: `${(el.x / W) * 100}%`, top: `${(el.y / H) * 100}%`, transform: "translate(-50%,-50%)", pointerEvents: "auto", zIndex: 20 }}>
                <div style={{ background: "#fff", borderRadius: 12, padding: 8, boxShadow: "0 8px 28px rgba(0,0,0,0.18)", border: `2px solid ${ACCENT}`, minWidth: 180 }}>
                  <textarea autoFocus value={editTxt} onChange={e => setEditTxt(e.target.value)} style={{ border: "none", outline: "none", resize: "vertical", minHeight: 36, fontSize: el.size || 20, color: el.color || "#333", fontFamily: el.fontFamily || "'Caveat',cursive", fontWeight: el.bold ? 800 : 500, fontStyle: el.italic ? "italic" : "normal", width: "100%", background: "transparent" }} />
                  <div style={{ display: "flex", gap: 6, justifyContent: "flex-end", marginTop: 4 }}>
                    <button onClick={() => { setEditId(null); }} style={{ ...btn, background: "#f0f0f0", color: "#999" }}>Cancelar</button>
                    <button onClick={commitEdit} style={{ ...btn, background: ACCENT, color: "#fff" }}>OK</button>
                  </div>
                </div>
              </div>
            ) : (
              <DragEl key={el.id} el={el} cW={W} cH={H} onMove={moveEl} onRemove={rmEl} onEdit={startEdit} onSelect={setSelId} sel={selId === el.id} />
            ))}
          </div>
          {inline && (
            <div style={{ position: "absolute", left: `${(inline.x / W) * 100}%`, top: `${(inline.y / H) * 100}%`, transform: "translate(-50%,-50%)", zIndex: 20, pointerEvents: "auto" }}>
              <div style={{ background: "#fff", borderRadius: 14, padding: 10, boxShadow: "0 8px 28px rgba(0,0,0,0.18)", border: `2px solid ${ACCENT}`, minWidth: 200, display: "flex", flexDirection: "column", gap: 6 }}>
                <textarea autoFocus value={inTxt} onChange={e => setInTxt(e.target.value)} placeholder="Escribe aquí..." onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); commitInline(); } }} rows={2}
                  style={{ border: "none", outline: "none", fontSize: tSize > 30 ? 20 : tSize, fontFamily: tFont.f, fontWeight: tBold ? 800 : 500, fontStyle: tItalic ? "italic" : "normal", color: penColor, resize: "vertical", width: "100%", background: "transparent", minHeight: 36 }} />
                <div style={{ display: "flex", gap: 6, justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ fontSize: 9, color: "#bbb", fontWeight: 600 }}>Enter = colocar</span>
                  <div style={{ display: "flex", gap: 6 }}>
                    <button onClick={() => setInline(null)} style={{ ...btn, background: "#f0f0f0", color: "#999" }}>✕</button>
                    <button onClick={commitInline} style={{ ...btn, background: ACCENT, color: "#fff" }}>Colocar ✨</button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// PAGE MANAGER
// ════════════════════════════════════════
function PageMgr({ notebook, onSelect, onAdd, onBack, onDelPage, onRename }) {
  const [editing, setEditing] = useState(false);
  const [newName, setNewName] = useState(notebook.name);
  return (
    <div style={{ height: "100vh", background: "#F8F5FC", fontFamily: "'Nunito',sans-serif", display: "flex", flexDirection: "column" }}>
      <div style={{ padding: "20px 24px", background: "#fff", borderBottom: "2px solid #F0ECF8", flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <button onClick={onBack} style={{ background: "none", border: "none", fontSize: 14, cursor: "pointer", color: "#999", fontWeight: 600 }}>← Cuadernos</button>
          <button onClick={onAdd} style={{ background: ACCENT, border: "none", borderRadius: 12, padding: "7px 16px", color: "#fff", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>+ Página</button>
        </div>
        {editing ? (
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 10 }}>
            <input value={newName} onChange={e => setNewName(e.target.value)} autoFocus
              onKeyDown={e => { if (e.key === "Enter") { onRename(newName); setEditing(false); } }}
              style={{ flex: 1, border: "none", borderBottom: `2px solid ${ACCENT}`, outline: "none", fontSize: 20, fontWeight: 800, color: "#444", fontFamily: "'Nunito',sans-serif", padding: "4px 0" }} />
            <button onClick={() => { onRename(newName); setEditing(false); }} style={{ background: ACCENT, border: "none", borderRadius: 8, padding: "5px 12px", color: "#fff", fontWeight: 700, fontSize: 11, cursor: "pointer" }}>OK</button>
            <button onClick={() => { setNewName(notebook.name); setEditing(false); }} style={{ background: "#f0f0f0", border: "none", borderRadius: 8, padding: "5px 12px", color: "#999", fontWeight: 700, fontSize: 11, cursor: "pointer" }}>✕</button>
          </div>
        ) : (
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 10 }}>
            <h2 style={{ margin: 0, fontSize: 22, fontWeight: 800, color: "#444" }}>{notebook.cover.emoji} {notebook.name}</h2>
            <button onClick={() => setEditing(true)} style={{ background: ACCENT_LIGHT, border: "none", borderRadius: 8, padding: "4px 10px", cursor: "pointer", fontSize: 12, color: ACCENT, fontWeight: 700 }}>✏️</button>
          </div>
        )}
        <p style={{ margin: "2px 0 0", fontSize: 12, color: "#bbb", fontWeight: 600 }}>{notebook.pages.length} páginas</p>
      </div>
      <div style={{ flex: 1, overflow: "auto", padding: 16 }}>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(130px,1fr))", gap: 14, maxWidth: 600, margin: "0 auto" }}>
          {notebook.pages.map((pg, i) => (
            <div key={pg.id}>
              <div onClick={() => onSelect(pg)} style={{
                aspectRatio: "7/9", borderRadius: 12, background: "#fff", border: "2px solid #F0ECF8",
                cursor: "pointer", overflow: "hidden", boxShadow: "0 3px 12px rgba(0,0,0,0.03)",
                transition: "all 0.2s", position: "relative",
              }} onMouseEnter={e => e.currentTarget.style.transform = "translateY(-3px)"} onMouseLeave={e => e.currentTarget.style.transform = ""}>
                {pg.canvasData ? <img src={pg.canvasData} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : <div style={{ width: "100%", height: "100%", display: "flex", alignItems: "center", justifyContent: "center", color: "#ddd", fontSize: 28 }}>{PAPER_TYPES.find(p => p.id === notebook.paperType)?.icon}</div>}
                {notebook.pages.length > 1 && <button onClick={e => { e.stopPropagation(); onDelPage(pg.id); }} style={{ position: "absolute", top: 4, right: 4, width: 20, height: 20, borderRadius: "50%", background: "rgba(255,80,80,0.8)", border: "none", color: "#fff", fontSize: 9, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>×</button>}
              </div>
              <p style={{ textAlign: "center", margin: "4px 0 0", fontSize: 10, fontWeight: 700, color: "#ccc" }}>Pág. {i + 1}</p>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// MAIN APP
// ════════════════════════════════════════
export default function CuteNotesApp() {
  const [tab, setTab] = useState("home");
  const [notebooks, setNotebooks] = useState([]);
  const [notes, setNotes] = useState([]);
  const [tasks, setTasks] = useState([]);
  const [events, setEvents] = useState([]);
  const [loaded, setLoaded] = useState(false);

  // Modals / views
  const [showNbCreator, setShowNbCreator] = useState(false);
  const [showQuick, setShowQuick] = useState(null); // "task"|"event"
  const [editingNote, setEditingNote] = useState(null); // note object or "new"
  const [activeNb, setActiveNb] = useState(null);
  const [activePage, setActivePage] = useState(null);
  const [nbView, setNbView] = useState(null); // "pages"|"canvas"

  // Load
  useEffect(() => { (async () => { try { const r = await window.storage.get("cn3-data"); if (r?.value) { const d = JSON.parse(r.value); setNotebooks(d.notebooks || []); setNotes(d.notes || []); setTasks(d.tasks || []); setEvents(d.events || []); } } catch(e){} setLoaded(true); })(); }, []);
  // Save
  useEffect(() => { if (!loaded) return; (async () => { try { await window.storage.set("cn3-data", JSON.stringify({ notebooks, notes, tasks, events })); } catch(e){} })(); }, [notebooks, notes, tasks, events, loaded]);

  // Notebook CRUD
  const createNb = (nb) => { setNotebooks(pr => [nb, ...pr]); setShowNbCreator(false); };
  const deleteNb = (id) => setNotebooks(pr => pr.filter(n => n.id !== id));
  const openNb = (nb) => { setActiveNb(nb); setNbView("pages"); };
  const addPage = () => { const p = { id: gid(), canvasData: null, elements: [], createdAt: Date.now(), updatedAt: Date.now() }; setNotebooks(pr => pr.map(n => n.id === activeNb.id ? { ...n, pages: [...n.pages, p], updatedAt: Date.now() } : n)); setActiveNb(pr => ({ ...pr, pages: [...pr.pages, p] })); };
  const delPage = (pid) => { setNotebooks(pr => pr.map(n => n.id === activeNb.id ? { ...n, pages: n.pages.filter(p => p.id !== pid) } : n)); setActiveNb(pr => ({ ...pr, pages: pr.pages.filter(p => p.id !== pid) })); };
  const renameNb = (newName) => { setNotebooks(pr => pr.map(n => n.id === activeNb.id ? { ...n, name: newName, updatedAt: Date.now() } : n)); setActiveNb(pr => ({ ...pr, name: newName })); };
  const savePage = (up) => { setNotebooks(pr => pr.map(n => n.id === activeNb.id ? { ...n, pages: n.pages.map(p => p.id === up.id ? up : p), updatedAt: Date.now() } : n)); setActiveNb(pr => ({ ...pr, pages: pr.pages.map(p => p.id === up.id ? up : p) })); setActivePage(up); };

  // Note CRUD
  const saveNote = (n) => { setNotes(pr => { const idx = pr.findIndex(x => x.id === n.id); if (idx >= 0) { const u = [...pr]; u[idx] = n; return u; } return [n, ...pr]; }); setEditingNote(null); };
  const delNote = (id) => setNotes(pr => pr.filter(n => n.id !== id));

  // Task/Event
  const saveTask = (t) => { setTasks(pr => [t, ...pr]); setShowQuick(null); };
  const saveEvent = (e) => { setEvents(pr => [e, ...pr]); setShowQuick(null); };

  const clearAll = async () => { setNotebooks([]); setNotes([]); setTasks([]); setEvents([]); try { await window.storage.delete("cn3-data"); } catch(e){} };

  const handleNav = (target, nbId) => { setTab(target); if (nbId) { const nb = notebooks.find(n => n.id === nbId); if (nb) openNb(nb); } };
  const handleQuickAdd = (type) => { if (type === "note") setEditingNote("new"); else setShowQuick(type); };

  // Canvas view
  if (nbView === "canvas" && activeNb && activePage) {
    const freshNb = notebooks.find(n => n.id === activeNb.id) || activeNb;
    return (
      <><style>{`@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Caveat:wght@400;500;600;700&family=Pacifico&display=swap');*{box-sizing:border-box;}::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:#E0D0F0;border-radius:3px;}`}</style>
        <NbCanvas notebook={freshNb} page={activePage} onSave={savePage} onBack={() => setNbView("pages")} />
      </>
    );
  }
  // Pages view
  if (nbView === "pages" && activeNb) {
    const freshNb = notebooks.find(n => n.id === activeNb.id) || activeNb;
    return (
      <><style>{`@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap');*{box-sizing:border-box;}`}</style>
        <PageMgr notebook={freshNb} onSelect={(pg) => { setActivePage(pg); setNbView("canvas"); }} onAdd={addPage} onBack={() => { setNbView(null); setActiveNb(null); }} onDelPage={delPage} onRename={renameNb} />
      </>
    );
  }
  // Note editor
  if (editingNote) {
    return (
      <><style>{`@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap');*{box-sizing:border-box;}`}</style>
        <NoteEditor note={editingNote === "new" ? null : editingNote} notebooks={notebooks} onSave={saveNote} onClose={() => setEditingNote(null)} />
      </>
    );
  }

  // Main app with tabs
  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column", background: "#FAFAFE", fontFamily: "'Nunito',sans-serif", position: "relative" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Pacifico&display=swap');*{box-sizing:border-box;}::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:#E0D0F0;border-radius:3px;}`}</style>

      {tab === "home" && <HomeScreen notebooks={notebooks} notes={notes} tasks={tasks} events={events} onNav={handleNav} onQuickAdd={handleQuickAdd} />}
      {tab === "notebooks" && <NotebooksShelf notebooks={notebooks} onCreate={() => setShowNbCreator(true)} onOpen={openNb} onDelete={deleteNb} />}
      {tab === "notes" && <NotesList notes={notes} onEdit={setEditingNote} onDelete={delNote} onCreate={() => setEditingNote("new")} onUpdate={saveNote} />}
      {tab === "calendar" && <CalendarView events={events} onAddEvent={() => setShowQuick("event")} />}
      {tab === "settings" && <Settings totalNotes={notes.length} totalNbs={notebooks.length} onClear={clearAll} />}

      <BottomNav active={tab} onChange={setTab} />

      {/* FAB */}
      <button onClick={() => handleQuickAdd("note")} style={{
        position: "fixed", bottom: 80, right: 20, width: 52, height: 52, borderRadius: "50%",
        background: ACCENT, border: "none", color: "#fff", fontSize: 26, cursor: "pointer",
        boxShadow: `0 6px 24px ${ACCENT}55`, display: "flex", alignItems: "center", justifyContent: "center",
        zIndex: 50, transition: "transform 0.2s",
      }} onMouseEnter={e => e.target.style.transform = "scale(1.1)"} onMouseLeave={e => e.target.style.transform = ""}>+</button>

      {showNbCreator && <NotebookCreator onClose={() => setShowNbCreator(false)} onCreate={createNb} />}
      {showQuick && <QuickCreator type={showQuick} onSave={showQuick === "task" ? saveTask : saveEvent} onClose={() => setShowQuick(null)} />}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(CuteNotesApp));
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
